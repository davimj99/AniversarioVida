<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nosso Presente ❤️</title>
  <link rel="stylesheet" href="presente.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
</head>

<body>

  <div class="galeria" id="galeria">
    <img src="imagens/familia1.jpeg" alt="Família " class="ativa">
    <img src="imagens/familia2.jpeg" alt="Família ">
    <img src="imagens/gatao.jpeg"    alt="Gatão">
    <img src="imagens/familia3.jpg" alt="Familia">
    <img src="imagens/pascoa1.jpg" alt="Familia">
    <img src="imagens/pascoa2.jpg" alt="Familia">
    <img src="imagens/pascoa3.jpg" alt="Familia">
  </div>

  <div class="vinheta"></div>

  <header class="topo">
    <h1>Nosso maior presente 👶❤️<br>Te AMAMOS MUITO MAMÃE
        <p>Hoje é dia muito especial pra nós, <br>EDUARDO E PAPAI É SEU FÃ!</p>
        <p>Um beijo e aproveita seu dia</p>
    </h1>
    <span class="badge" id="contador">AI VIDA ESTAMOS TE AMANDOOO</span>
  </header>

  <div class="legenda">
    <span>Memórias</span>
    <h2 id="desc">Família</h2>
  </div>

  <nav class="botoes" aria-label="Controles da galeria">

    <div class="dots" id="dots"></div>
    <button onclick="proximo()"  aria-label="Próxima imagem">&#8594;</button>
  </nav>

  <button class="btn-voltar" onclick="voltar()" aria-label="Voltar">&#8617; Voltar</button>

  <div class="progress" id="progress"></div>

  <script src="presente.js"></script>

  <footer class="footer">
    <div class="footer-content">
      <p>Feito com carinho por quem te ama muito</p>
      <span>© 25/04/2026 <br>Desenvolvido por Davi Dev &copy;</span>
    </div>
  </footer>

</body>
</html>
